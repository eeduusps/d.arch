<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Showcase</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top left,#2563eb55,transparent 30%),
        radial-gradient(circle at bottom right,#9333ea55,transparent 30%);
    z-index:-1;
}

header{
    position:sticky;
    top:0;
    z-index:100;
    backdrop-filter:blur(15px);
    background:rgba(15,23,42,.7);
    border-bottom:1px solid rgba(255,255,255,.08);
}

.navbar{
    max-width:1300px;
    margin:auto;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.search-box{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.search-box input,
.search-box select{
    padding:12px 15px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,.08);
    color:white;
    min-width:180px;
}

.hero{
    max-width:1300px;
    margin:auto;
    padding:80px 20px 50px;
}

.hero h1{
    font-size:52px;
    margin-bottom:15px;
}

.hero p{
    color:#cbd5e1;
    line-height:1.7;
    max-width:700px;
}

.container{
    max-width:1300px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    overflow:hidden;
    transition:.3s;
    backdrop-filter:blur(15px);
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 20px 40px rgba(0,0,0,.35);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.status{
    display:inline-block;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    margin-bottom:12px;
    background:#2563eb33;
    color:#93c5fd;
}

.card h2{
    margin-bottom:10px;
}

.desc{
    color:#cbd5e1;
    line-height:1.6;
    margin-bottom:18px;
}

.tech{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:18px;
}

.tech span{
    background:rgba(255,255,255,.08);
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
}

.card-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.btn{
    padding:10px 16px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    text-decoration:none;
    color:white;
    background:#2563eb;
    transition:.3s;
}

.btn:hover{
    opacity:.85;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
    z-index:999;
}

.modal-content{
    background:#111827;
    width:100%;
    max-width:900px;
    border-radius:24px;
    overflow:auto;
    max-height:95vh;
}

.modal-body{
    padding:25px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.gallery img{
    width:100%;
    border-radius:16px;
    height:180px;
    object-fit:cover;
}

.progress{
    width:100%;
    height:12px;
    background:#1e293b;
    border-radius:999px;
    overflow:hidden;
    margin:15px 0;
}

.progress div{
    height:100%;
    background:#2563eb;
}

.close-btn{
    float:right;
    font-size:28px;
    cursor:pointer;
}

.loading,
.empty{
    text-align:center;
    padding:80px 20px;
    color:#cbd5e1;
}

@media(max-width:768px){
    .hero h1{
        font-size:36px;
    }
}
</style>
</head>
<body>

<header>
    <div class="navbar">
        <div class="logo">d'arch</div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search project...">

            <select id="categoryFilter">
                <option value="">All Category</option>
            </select>

            <select id="statusFilter">
                <option value="">All Status</option>
            </select>
        </div>
    </div>
</header>

<section class="hero">
    <h1>My Project'ed</h1>
    <p>
        
    </p>
</section>

<div class="container">
    <div id="loading" class="loading">Loading project...</div>
    <div id="projectGrid" class="grid"></div>
    <div id="emptyState" class="empty" style="display:none;">
        Tidak ada project ditemukan.
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
let allProjects = [];

async function loadProjects(){
    try{
        const response = await fetch('database/database.json');
        const data = await response.json();

        allProjects = data.projects || [];

        renderFilters(allProjects);
        renderProjects(allProjects);

        document.getElementById('loading').style.display = 'none';

    }catch(error){
        document.getElementById('loading').innerHTML = `
            Gagal membaca database<br><br>
            Jalankan Kembali
        `;

        console.error(error);
    }
}

function renderFilters(projects){
    const categories = [...new Set(projects.map(p => p.category))];
    const statuses = [...new Set(projects.map(p => p.status))];

    const categoryFilter = document.getElementById('categoryFilter');
    const statusFilter = document.getElementById('statusFilter');

    categories.forEach(category => {
        categoryFilter.innerHTML += `<option value="${category}">${category}</option>`;
    });

    statuses.forEach(status => {
        statusFilter.innerHTML += `<option value="${status}">${status}</option>`;
    });
}

function renderProjects(projects){
    const grid = document.getElementById('projectGrid');
    const empty = document.getElementById('emptyState');

    grid.innerHTML = '';

    if(projects.length === 0){
        empty.style.display = 'block';
        return;
    }

    empty.style.display = 'none';

    projects.forEach(project => {

        const techList = project.technology
            .map(tech => `<span>${tech}</span>`)
            .join('');

        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
            <img src="${project.thumbnail}" alt="${project.name}">

            <div class="card-content">

                <div class="status">${project.status}</div>

                <h2>${project.name}</h2>

                <p class="desc">${project.description}</p>

                <div class="tech">${techList}</div>

                <div class="card-footer">
                    <small>${project.client}</small>

                    <div style="display:flex; gap:10px;">
                        <a href="${project.website}" target="_blank" class="btn">
                            Visit
                        </a>

                        <button class="btn" onclick="showDetail(${project.id})">
                            Detail
                        </button>
                    </div>
                </div>

            </div>
        `;

        grid.appendChild(card);
    });
}

function showDetail(id){
    const project = allProjects.find(p => p.id === id);

    if(!project) return;

    const gallery = project.gallery
        .map(img => `<img src="${img}">`)
        .join('');

    const tags = project.tags
        .map(tag => `<span>${tag}</span>`)
        .join('');

    const team = project.team
        .map(member => `<li>${member}</li>`)
        .join('');

    document.getElementById('modalBody').innerHTML = `
        <span class="close-btn" onclick="closeModal()">×</span>

        <h1 style="margin-bottom:15px;">${project.name}</h1>

        <p style="line-height:1.8; color:#cbd5e1;">
            ${project.description}
        </p>

        <div class="progress">
            <div style="width:${project.progress}%"></div>
        </div>

        <p>Progress : ${project.progress}%</p>

        <br>

        <h3>Technology</h3>
        <div class="tech" style="margin-top:10px;">
            ${project.technology.map(t => `<span>${t}</span>`).join('')}
        </div>

        <br>

        <h3>Tags</h3>
        <div class="tech" style="margin-top:10px;">
            ${tags}
        </div>

        <br>

        <h3>Team Member</h3>
        <ul style="margin-top:10px; padding-left:20px; line-height:1.8;">
            ${team}
        </ul>

        <br>

        <h3>Gallery</h3>

        <div class="gallery">
            ${gallery}
        </div>

        <br>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <a href="${project.website}" target="_blank" class="btn">
                Visit Website
            </a>

            <a href="${project.repository}" target="_blank" class="btn">
                Repository
            </a>
        </div>

        <br>

        <small>
            Last Update : ${project.last_update}
        </small>
    `;

    document.getElementById('modal').style.display = 'flex';
}

function closeModal(){
    document.getElementById('modal').style.display = 'none';
}

window.onclick = function(e){
    if(e.target.id === 'modal'){
        closeModal();
    }
}

function filterProjects(){
    const search = document.getElementById('searchInput').value.toLowerCase();
    const category = document.getElementById('categoryFilter').value;
    const status = document.getElementById('statusFilter').value;

    const filtered = allProjects.filter(project => {

        const matchSearch =
            project.name.toLowerCase().includes(search) ||
            project.description.toLowerCase().includes(search);

        const matchCategory =
            category === '' || project.category === category;

        const matchStatus =
            status === '' || project.status === status;

        return matchSearch && matchCategory && matchStatus;
    });

    renderProjects(filtered);
}


document.getElementById('searchInput')
.addEventListener('input', filterProjects);


document.getElementById('categoryFilter')
.addEventListener('change', filterProjects);


document.getElementById('statusFilter')
.addEventListener('change', filterProjects);

loadProjects();
</script>

</body>
</html>
